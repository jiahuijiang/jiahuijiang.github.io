<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
  <div class ="image-gallery">
    {% for image in page.images%}
    <img src={{page.image-dir}}{{image.id}}.png alt={{image.id}}  class="img-gallery" />
    <a title={{image.name}}>
      <img src={{page.image-dir}}{{image.id}}.png alt={{image.id}}  class="img-gallery" />
    </a>
    <div class="no-text-decoration" title={{image.name}}>{{image.name}}</div>
    {% endfor %}
  </div>
</body>
</html>
